# CI: typecheck, Vitest, lint, audit (high+). iso-pro-shared via vendor/ ou pasta irmã no monorepo local.
# Local: npm run ci — Release campo: docs/checklist-release-campo.md

name: CI

run-name: CI · ${{ github.event_name }} · ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: CI (typecheck, test, lint, audit)
        run: npm run ci

      - name: Maestro E2E (login validacao, opcional)
        continue-on-error: true
        run: |
          if command -v maestro >/dev/null 2>&1; then
            maestro test .maestro/login-validacao.yaml
          else
            echo "Maestro CLI ausente — ignorado. Instale: https://maestro.mobile.dev"
          fi
